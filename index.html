<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MCP Básico (Demo)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-label="MCP Básico">
    <header class="topbar">
      <h1>MCP Básico</h1>
      <div class="hint">Rueda / arrastra sobre cada selector • Click en +/−</div>
    </header>

    <section class="grid">
      <!-- COURSE -->
      <article class="card" data-control="course">
        <div class="card__title">COURSE</div>
        <div class="display" aria-label="Course value">
          <span class="display__value" id="courseValue">165</span>
          <span class="display__unit">°</span>
        </div>
        <div class="knob" id="courseKnob" tabindex="0" role="slider"
             aria-label="Course selector" aria-valuemin="0" aria-valuemax="359" aria-valuenow="165">
          <div class="knob__ring"></div>
          <div class="knob__marker" id="courseMarker"></div>
        </div>
        <div class="btnrow">
          <button class="btn" data-action="dec" data-target="course">−</button>
          <button class="btn" data-action="inc" data-target="course">+</button>
        </div>
        <div class="subhint">Paso: 1°</div>
      </article>

      <!-- SPEED -->
      <article class="card" data-control="speed">
        <div class="card__title">SPEED</div>
        <div class="display" aria-label="Speed value">
          <span class="display__value" id="speedValue">100</span>
          <span class="display__unit">kt</span>
        </div>
        <div class="knob" id="speedKnob" tabindex="0" role="slider"
             aria-label="Speed selector" aria-valuemin="0" aria-valuemax="450" aria-valuenow="100">
          <div class="knob__ring"></div>
          <div class="knob__marker" id="speedMarker"></div>
        </div>
        <div class="btnrow">
          <button class="btn" data-action="dec" data-target="speed">−</button>
          <button class="btn" data-action="inc" data-target="speed">+</button>
        </div>
        <div class="subhint">Paso: 1 kt (Shift: 10)</div>
      </article>

      <!-- HEADING -->
      <article class="card" data-control="heading">
        <div class="card__title">HEADING</div>
        <div class="display" aria-label="Heading value">
          <span class="display__value" id="headingValue">130</span>
          <span class="display__unit">°</span>
        </div>
        <div class="knob" id="headingKnob" tabindex="0" role="slider"
             aria-label="Heading selector" aria-valuemin="0" aria-valuemax="359" aria-valuenow="130">
          <div class="knob__ring"></div>
          <div class="knob__marker" id="headingMarker"></div>
        </div>
        <div class="btnrow">
          <button class="btn" data-action="dec" data-target="heading">−</button>
          <button class="btn" data-action="inc" data-target="heading">+</button>
        </div>
        <div class="subhint">Paso: 1° (Shift: 10)</div>
      </article>

      <!-- ALTITUDE -->
      <article class="card" data-control="altitude">
        <div class="card__title">ALTITUDE</div>
        <div class="display" aria-label="Altitude value">
          <span class="display__value" id="altitudeValue">31000</span>
          <span class="display__unit">ft</span>
        </div>
        <div class="knob" id="altitudeKnob" tabindex="0" role="slider"
             aria-label="Altitude selector" aria-valuemin="0" aria-valuemax="45000" aria-valuenow="31000">
          <div class="knob__ring"></div>
          <div class="knob__marker" id="altitudeMarker"></div>
        </div>
        <div class="btnrow">
          <button class="btn" data-action="dec" data-target="altitude">−</button>
          <button class="btn" data-action="inc" data-target="altitude">+</button>
        </div>
        <div class="subhint">Paso: 100 ft (Shift: 1000)</div>
      </article>

      <!-- V/S -->
      <article class="card" data-control="vs">
        <div class="card__title">V/S</div>
        <div class="display" aria-label="Vertical speed value">
          <span class="display__value" id="vsValue">0</span>
          <span class="display__unit">fpm</span>
        </div>
        <div class="knob" id="vsKnob" tabindex="0" role="slider"
             aria-label="Vertical speed selector" aria-valuemin="-6000" aria-valuemax="6000" aria-valuenow="0">
          <div class="knob__ring"></div>
          <div class="knob__marker" id="vsMarker"></div>
        </div>
        <div class="btnrow">
          <button class="btn" data-action="dec" data-target="vs">−</button>
          <button class="btn" data-action="inc" data-target="vs">+</button>
        </div>
        <div class="subhint">Paso: 100 fpm (Shift: 500)</div>
      </article>
    </section>

    <footer class="footer">
      <button class="ghost" id="resetBtn">Reset</button>
      <div class="small">Demo estática para GitHub Pages • Sin dependencias</div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
